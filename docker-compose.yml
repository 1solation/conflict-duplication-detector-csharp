services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ASPNETCORE_ENVIRONMENT: Production
      VectorStore__PersistPath: /data/vectors.json
      Storage__UploadsPath: /data/uploads
    volumes:
      - detector-data:/data
    restart: unless-stopped

volumes:
  detector-data:
